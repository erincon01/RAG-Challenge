name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install -r backend/requirements.txt

      - name: Check formatting
        run: ruff format --check backend/app

      - name: Check linting
        run: ruff check backend/app

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run mypy
        run: mypy backend/app

  unit-tests:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    env:
      # Safe dummy values — unit tests mock all external calls via DI overrides
      DB_SERVER_AZURE_POSTGRES: localhost
      DB_NAME_AZURE_POSTGRES: ragtest
      DB_USER_AZURE_POSTGRES: testuser
      DB_PASSWORD_AZURE_POSTGRES: testpass
      DB_SERVER_AZURE: localhost
      DB_NAME_AZURE: ragtest
      DB_USER_AZURE: testuser
      DB_PASSWORD_AZURE: testpass
      OPENAI_KEY: test-key-000
      OPENAI_ENDPOINT: https://test.openai.azure.com/
      OPENAI_MODEL: gpt-4o
      BASE_URL: https://github.com/statsbomb/open-data/raw/master/data
      REPO_OWNER: statsbomb
      REPO_NAME: open-data
      LOCAL_FOLDER: ./data

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run unit and API tests with coverage
        working-directory: backend
        run: |
          pytest tests/ -v \
            -m "not integration" \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/.coverage

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    # Only runs when explicitly triggered — requires full Docker stack
    if: ${{ vars.RUN_E2E_TESTS == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Wait for backend healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health/live; then break; fi
            sleep 5
          done

      - name: Load seed data
        run: docker compose exec -T backend python -m scripts.seed_load --source postgres

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: frontend/webapp
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend/webapp
        run: npx playwright test

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: frontend/webapp/tests/e2e/screenshots/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only runs when explicitly triggered — not on every PR
    if: ${{ vars.RUN_INTEGRATION_TESTS == 'true' }}
    env:
      DB_SERVER_AZURE_POSTGRES: ${{ secrets.DB_SERVER_AZURE_POSTGRES }}
      DB_NAME_AZURE_POSTGRES: ${{ secrets.DB_NAME_AZURE_POSTGRES }}
      DB_USER_AZURE_POSTGRES: ${{ secrets.DB_USER_AZURE_POSTGRES }}
      DB_PASSWORD_AZURE_POSTGRES: ${{ secrets.DB_PASSWORD_AZURE_POSTGRES }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run integration tests
        working-directory: backend
        run: pytest tests/integration/ -v -m integration

