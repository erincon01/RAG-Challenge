services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 17 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_challenge}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_local_pwd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rag_challenge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SQL Server 2025 Express (Linux)
  # ---------------------------------------------------------------------------
  sqlserver:
    build:
      context: ./infra/docker/sqlserver
      dockerfile: Dockerfile
    container_name: rag-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-SqlServer_Local_Pwd123!}
      MSSQL_PID: "Express"
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD:-SqlServer_Local_Pwd123!} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-backend
    env_file:
      - .env.docker
    environment:
      ENVIRONMENT: local
      DB_SERVER_AZURE_POSTGRES: postgres
      DB_NAME_AZURE_POSTGRES: ${POSTGRES_DB:-rag_challenge}
      DB_USER_AZURE_POSTGRES: ${POSTGRES_USER:-postgres}
      DB_PASSWORD_AZURE_POSTGRES: ${POSTGRES_PASSWORD:-postgres_local_pwd}
      DB_SERVER_AZURE: sqlserver
      DB_NAME_AZURE: rag_challenge
      DB_USER_AZURE: sa
      DB_PASSWORD_AZURE: ${MSSQL_SA_PASSWORD:-SqlServer_Local_Pwd123!}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./config:/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend (Streamlit)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  sqlserver_data:
    driver: local
